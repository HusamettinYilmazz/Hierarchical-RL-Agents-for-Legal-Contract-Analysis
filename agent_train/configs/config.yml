
experiment:
  name: ""
  version: ""
  seed: 
  info: "information about the experiement"

data:
  dataset_name: "CUAD_v1"
  dataset_path: "/kaggle/input/datasets/konradb/atticus-open-contract-dataset-aok-beta/CUAD_v1/CUAD_v1.json"
  train_dataset_path: ""
  test_dataset_path: ""
  output_path: "outputs/"
  

model:
  base_model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  sft_model_path: "/kaggle/input/models/husamsha/checkpoint-2614/pytorch/default/1/checkpoint-2614"


training:
  lora_r: 8
  lora_alpha: 32
  lora_dropout: 0.05
  lora_bias: "none"
  lora_task_type: "CAUSAL_LM"
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  
  sft_num_train_epochs: 1
  sft_per_device_train_batch_size: 1
  sft_gradient_accumulation_steps: 8
  sft_learning_rate: 2e-5
  sft_logging_steps: 10
  sft_save_steps: 200

  grpo_learning_rate: 5e-6
  grpo_per_device_train_batch_size: 4
  grpo_gradient_accumulation_steps: 8
  grpo_num_generations: 4
  grpo_logging_steps: 10
  grpo_save_steps: 200
